body:
  text: 通天救苦朱表具位臣某誠惶誠恐稽首頓首再拜上言臣塵土微資草茅賤質偶緣宿慶叨沐恩光佩籙進階傳經受道希夷莫悟愚鈍自將過有淵陵功無銖黍曲承㴠育未賜誅夷濟物度人上酬奬遇臣謹據齋意臣切慮泉曲羅酆三官九署鐵圍無間積夜重隂羈考罪魂終天莫釋自非歸神蒼極請命青華普軫慈悲曷由出離來朝玄陛受錬更生庸是不揆斐愚謹為拜表一通上聞青宫伏望慧力矜憐威神垂軫特降青玄妙氣百寶光明披朗重隂開明長夜天上天下無不照耀即使亡過某超凌幽暗證妙虛無釋罪原情飛登金闕臣謹為上請青玄救苦童子救苦玊女九龍符命使者上詣東極長樂宫玉陛下請降東華九龍符命告下十方無極神鄉𡨋路幽關應干考禁去處為亡某疾除罪簿落滅惡根部衛形魂應時解脫又為上請青玄黃籙破獄靈官破獄主吏持符神吏命符飛龍驛吏一合下降勑破幽牢嘯命𡨋吏即使火山息焰氷池靜波劒變騫林刀化玉樹地獄摧毀鐵城開宣放遣亡靈出離苦惱來親壇陛覩見光明又為上請太乙真光引魂仙吏赤光三氣化魂靈官六道尋魂使者夜光召魂判吏急速飛雲靈官一合下降追攝亡過某真魂正魄克返陽居沐浴更衣朝真受食又為上請朱陵火府南昌上宫錬度真司黃華玉女童子水火將軍一合下降專為亡過某蕩滌塵穢陶冶業氛表裏洞明形神清淨又為上請通和玄靈玉女左右崇正靈官領魂録功飛雲正吏玉清察符仙吏飛雲通遊移籍靈官一合下降特為亡過某詳辨監察保舉合生紀録善功領魂超邁移割鬼籍注入仙曹永為種民無有輪轉又為上請仙魂逍遙快樂自然清淨仙吏專度曲度太玄靈官玉女功曹主簿大神引領亡過某度上太一玄生之府朝謁蓮座遊宴妙嚴身生玉光衣食自在更冀祥煙塞死慶雲開生五苦三塗均證無為之果四生六道疾超有漏之鄉率土普天咸霑利益恩惟慈造願察翹傾臣愚謹因青玄玉女青玄功曹四直玉文功曹運神會道功曹十方飛天使者各一人出操臣為某拜上通天救苦朱表一通上詣東極門下伏願天恩告報臣誠惶誠恐稽首頓首再拜以聞臣姓某屬某州縣某宮觀靖焚修東極天中長樂宫內大慈仁者尋聲赴感太一救苦天尊玉陛下太嵗年月日於某處拜上東極表具位臣某誠惶誠恐稽首頓首再拜上言今月某日為修齋弟子某崇建青玄救苦妙齋幾畫夜開度亡過某靈魂謹具表奏陳者伏以赤明開圖愛日周流於六合青玄御運祥煙鬱勃於九幽昭回白玉之光洞煥紫金之相尋聲赴感應念垂慈惟拔領以無方故皈依而有請臣誠惶誠恐稽首頓首伏念亡過某靈魂留連世網涉歷塵機欲海千尋每泛狂瀾而飄蕩愛河萬仞莫排濁浪以流吹精神陷溺於一朝步武沉淪於九夜銅關檢擊鐵壘周遭寂寂銜哀徒羡求生之有路皇皇茹苦頓驚救死之無門自非歸命於青華曷俾神超於黃混恭惟東極天中長樂宫內大慈仁者尋聲赴感太一救苦天尊玉陛下威神遍滿慧力周回七寶騫林灑輝輝之甘露九色蓮座敷奕奕之慈雲真光覆遍於大千瑞氣咸舒於百億凡居陶冶亶藉提携伏願聖德昭彰靈威浩蕩勑九司之仙吏制地承符宣二府之真曹憲天弘道為紀善功於丹簡即銷惡障於玄編庶俾亡過某魂眇眇乘晨匆匆離夜絶地獄熱惱之苦永斷黑酆享天堂清淨之歡徑躋朱火步武快登於妙有形神疾證於虛無臣下情無任激切之至謹奉表奏以聞謹言年月日具位臣姓某上表又具位臣某再拜丄言今月某日為修齋弟子某崇建青玄救苦妙齋幾晝夜開度亡過某靈魂謹具表奏陳者伏以青玄開府卿雲騰三極之輝黃籙建宫飛霧散八遐之彩慧日昭回於獅御神風赫奕於龍章輒控寸丹仰陳尺素臣誠惶誠恐稽首頓首伏念臣幸乘景運獲奉昌期弘道憲天仰騫墀而綴武膺符宣德拱蓮座以承顔既叨化育之恩敢報裁成之澤恭惟東極天中長樂宫內大慈仁者尋聲赴感太一救苦天尊玉陛下妙嚴髙拱長樂端凝應念垂慈散祥煙於死戶尋聲赴感灑甘露於生門普使幽沉咸歸拔領伏願匆匆離夜眇眇乘晨黑鬱刋圖消大千之妄暗青華定籍乘太一之真光永侍紫金髙登碧玉臣下情無任激切之至謹奉表奏以聞謹言年月日具位臣姓某上表破獄表具位臣某再拜上言今月某日為修齋弟子某崇建青玄救苦妙齋幾晝夜開度亡過某靈魂以今準式破獄召魂者臣伏以登真度命凝湛露於青華毀鎖張門散祥煙於黑鬱敢扣慈悲之聖冀敷拔度之仁百拜陳情一忱請命臣誠惶誠恐稽首頓首切慮寒庭滯爽幽壑窮魂鐵壘周遭萬劫受羈維之苦銅關赫奕千齡膺囚禁之嚴鬼官職憲於隂陽𡨋吏司刑於水火匪繇勑破曷俾超凌恭惟東極天中長樂宫內大慈仁者尋聲赴感太一救苦天尊玉陛下應感無方提携有造降威光於百寶披朗重隂䇿神杖於五靈洞開積夜願垂淵聽昭俾俞音如律宣行密契龍符而啓旦依科摧毀頓令犴室以生春即使亡過某離夜無憂乘晨有喜耀華芒而煒燁九壘煥明飛靈鍚以徘徊三途康泰均提苦趣同證樂鄉臣下情無任激切之至謹奉表奏以聞謹言年月日具位臣姓某上表青玄言功表具位臣某再拜上言今月某日為修齋弟子某就某處崇建青玄救苦妙齋幾晝夜開度亡過某靈魂以今解壇謝過為官君將吏言功者臣伏以青玄御運敷慧露以流滋黃籙開圖耀慶雲而飛灑金簡煥龍符之祕瑶圖開鳳笈之竒三極回生九垓起死荷光明而濟下真切酬恩蓋激越以由中勤拳謝過尚祈淵默曲賜赦原臣誠惶誠恐稽首頓首伏念臣轍鮒微材坎蛙陋識莫奉行於青律徒參贊於玄班未諳俯仰之規威儀多冒尚昧齋修之典禁戒輕違䇿役妄召於真曹關奏濫稱於主職言辭顚倒敢演金科存念周章濫飛玉篆施為既彰於謬戾省循恐積於愆尤恪冀慈仁悉從矜宥恭惟東極青玄老君太一救苦天尊玉陛下道宏三極德邁十華提奬真靈為計功而行賞扶持職守俾含垢以匿瑕其有修齋之初上請天仙兵吏地仙兵馬真人兵馬神人兵馬日月星宿兵馬三河四海兵馬九宫五帝兵馬三十二天監齋直事侍香玉童散花玉女三五功曹左右官使者五帝直符直日香官飛龍騎吏靈寶天仙內院諸天承受玉女運神會道功曹青玄黃籙左右真司仙靈官吏九天普度院仙官將吏玄壇開度混元司解結司監生司天醫司浣濯司巾笥司攝化司諸部承宣官吏本靖侍靖仙官玉童玉女主副官將某護道某監壇某主壇某諸省府院司效職宣勞官君將吏監臨翊衛某廟某神本州城隍司本縣城隍司某鄉某里里域真官土地正神三界符使四直功曹齋家土地司命六神在壇守職備著勤勞並各顯服嚴裝隨臣所進表文上詣玄都列受功賞臣敢不銘心精進潔已操修期母負於生成庸恢張於化育運元契道倘成東華合景之功領教學真願佐南丹受書之化臣無任激切感戴之至謹奉表奏以聞謹言年月日具位臣姓某上表請水火表具位臣某再拜上言今月某日為齋法弟子某崇建某齋幾晝夜開度亡過某靈魂上生仙界以今請降水火錬度者臣伏以乾坤定位敷祖氣以昭回離坎分精極靈功而化育五文開廓萬品裁成欲施九錬之神輝亶藉二儀之聖運臣誠惶誠恐稽首頓首切慮亡過某靈魂劫塵結習業垢交周返九氣之生根期還本始稽五形之死蒂莫契虛無非陶冶以髙躋曷超凌而直上方諸耀彩挹東井之黃華陽燧凝芒瀉南丹之朱火匪繇鑒映孰佐宣揚恭惟太上無形無名虛無自然至真大道無上元尊金闕玉陛下道並隂陽德包覆載願頒勑命降五龍結璘之英載役神真布九鳳鬱儀之化俾回骸而起死庶監真以度生九遍成人氣氣返生神之妙十回度品神神昭委氣之玄離夜朝元乘晨御景臣無任激切望恩之至謹奉表陳啓以聞臣誠惶誠恐稽首頓首謹言年月日具位臣姓某上表大道表具位臣某再拜上言今月某日奉為修齋弟子某崇建某齋幾晝夜開度亡過某靈魂以今具表奏聞者臣伏以扣九關而昭事雲藹清微崇八陛以對揚風清黑鬱徼三極無𥝠之慧溥十華有造之恩雨露㴠濡日星朗煥敢皈依於楓御庸傾倒於葵𠂻恪冀髙明洞垂昭鑒臣誠惶誠恐稽首頓首切念亡過某靈魂𡨚機織性罪網縈心三惑不除墮迷途而顚倒四維莫守趨邪徑以回旋罪花纍紀於圵酆愆葉積書於東岱茫茫夜壑慘水火以驚心寂寂寒庭望隂陽而喪膽爰崇懴謝聿建修齋自非上聖之海㴠曷俾下愚之春育恭惟太上無形無名虛無自然至真大道無上元尊金闕玉陛下巍巍莫極蕩蕩難名凝妙有以垂精化敷九地孕虛無而育粹政溥三天誕矜苦惱之哀廣錫慈悲之惠伏願靈光不夜祖氣長春勑勒玄曹削簡書之𡨚對嘯命丹局消録籍之愆尤即俾亡過某靈魂離夜歡欣乘晨快樂超凌三界無拘留逼合之憂勑制九扄有侍衛送迎之喜某敢不仰依化日期暢玄風登碧玉以敷心勉承鳳渥覲紫金而拜手永沐龍恩臣下情無任激切之至謹奉表陳啓以聞臣誠惶誠恐稽首頓首謹言年月日具位臣姓某上表血湖表具位臣某再拜上言今月某日為齋主某崇建某齋幾晝夜開度亡過某靈魂上生仙界切見本人因産隕生形神腥穢惟憑聖造曲為蕩除庶俾氣象周圓營衛平復謹具表奏聞者臣伏以生生大德夙欽惠下之仁翼翼小心爰露由中之懇黑鬱期超於地禁玄虛嘉被於天光再拜陳情一忱請命臣誠惶誠恐稽首頓首伏念臣偶緣宿慶獲際昌期弘道憲天幾對揚於龍御承符宣德誓流演於鴻禧重念亡過某靈魂托質女流謀身世諦中迷愛網易雕土樹之方外涉塵機遂滓金花之粹九夜沉淪於苦海一朝陷溺於血湖獄吏權尊轉眼隂陽之考𡨋官威重驚心水火之羈自非大霈於宸恩曷克逈躋於陽化恭惟太上無形無名虛無自然至真大道無上元尊金闕玉陛下道包覆載德契幽明仁風鼓舞於八遐群靈樂意化雨涵濡於九壘億爽歡顔冀矜激切之𠂻嘉沐駢蕃之澤伏願肆頒鶴赦曲降鸞書飛三氣以流光乘晨有望燭十華而破暗離夜不幽即俾亡過某靈魂垢穢澄清身心快樂朱陵度命解萬罪以清夷黑籍銷名散千𡨚而和合精神玉潔步武春融臣無任激切懇祈之至謹奉表陳啓以聞臣誠惶誠恐稽首頓首謹言年月日具位臣姓某上表六幕啓表玄師表具位臣某再拜上言今月某日為齋法弟子某人崇建某齋若干晝夜開度云開度亡過某靈魂仰祈天澤克證生方祈禳云為某事仰祈天澤保佑平安以今宿啓告齋者臣伏以教出始青煥靈光於五劫道敷碧落流祖氣於八遐孰扶齋律之崇亶賴師垣之貴敢依聖造輒控愚𠂻臣誠惶誠恐稽首頓首伏念臣緣藉慶基生逢昌運雌雄凝妙徒混景於東諸經緯融玄莫䇿真於西禁冒領瑶壇而奏對懼書玉簡以凌兢亶藉髙明曲垂提軫恭惟玄中大法師真君聖前稟精妙有育粹太無綱紀十華播靈風而化育主張三洞流慧日以生成願運淵慈俯迂飈馭頒符定令俾參贊於天常宣化承流庶裁成於地澤圓成齋福流演宸恩臣無任激切懇祈之至謹奉表陳啓以聞臣誠惶誠恐稽首頓首謹言年月日具位臣姓某上表天師表具位臣某再拜上言今月某日為齋法弟子某崇建某齋若干晝夜開度云開度亡過某靈魂仰祈天澤克證生方祈禳云為某事仰祈天澤保佑平安以今宿啓告齋者臣伏以龍漢開圖播函三之聖化鶴鳴啓運宏得一之神功臣誠惶誠恐稽首頓首伏念臣緣藉慶基生逢昌運雌雄凝妙徒混景於東諸經緯融玄莫䇿真於西禁冒領瑶壇而奏對懼書玉簡以凌兢亶藉髙明曲垂提軫恭惟三天大法師真君聖前稟資道粹分氣魁靈祖日輝明