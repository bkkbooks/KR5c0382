通精得生人身寂然兜術天帝特降碭尸冥演由之氣九重纒其魄使亡過某人𩲸戶降仙以安寧得生人身波羅尼蜜不驕樂天帝特降五仙中靈之氣九重纒其臟使亡過某人五臟清涼以存神得生人身洞玄化應聲天帝特降髙真沖融之氣九重纒其腑使亡過某人六腑開泰胃管生津得生人身靈化梵輔天帝特降髙仙洞笈之氣九重纒其竅使亡過某人孔竅開聰星宿朗明以通神得生人身髙虛清明天帝特降真靈化凝之氣九重纒其形使亡過某人三部八景整具形神以全真得生人身無想無結無愛天帝特降自然玄照之氣九重纒其身使亡過某人三關五臟關節根源本始一時生神氣滿能聲聲尚神具毛髮生身太上三洞表文
